<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secure Card Payment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

background:linear-gradient(135deg,#11998e,#38ef7d);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:30px;

}

.payment-box{

background:white;

width:100%;
max-width:700px;

padding:40px;

border-radius:25px;

box-shadow:0 20px 40px rgba(0,0,0,.25);

animation:popup .8s;

}

@keyframes popup{

from{
transform:scale(.8);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

h1{

text-align:center;

color:#198754;

font-weight:bold;

margin-bottom:10px;

}

.total{

text-align:center;

font-size:38px;

font-weight:bold;

color:#198754;

margin-bottom:30px;

}

.logo-row{

display:flex;

justify-content:center;

align-items:center;

gap:30px;

margin-bottom:35px;

}

.logo-row img{

height:40px;

transition:.3s;

}

.logo-row img:hover{

transform:scale(1.1);

}

.form-label{

font-weight:600;

}

.form-control{

height:52px;

border-radius:12px;

font-size:17px;

}

.pay-btn{

height:55px;

font-size:22px;

border-radius:50px;

font-weight:bold;

}

.secure{

text-align:center;

margin-top:20px;

color:#666;

}

</style>

</head>

<body>

<div class="payment-box">

<h1>

💳 Secure Card Payment

</h1>

<div class="total">

₹ {{ total }}

</div>

<div class="logo-row">

<img src="/media/payment/visa.png" alt="Visa">

<img src="/media/payment/mastercard.png" alt="MasterCard">

<img src="/media/payment/rupay.png" alt="RuPay">

</div>

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">

Card Number

</label>

<input
type="text"
class="form-control"
placeholder="1234 5678 9012 3456"
maxlength="19"
required>

</div>

<div class="mb-3">

<label class="form-label">

Card Holder Name

</label>

<input
type="text"
class="form-control"
placeholder="Enter Card Holder Name"
required>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Expiry Date

</label>

<input
type="text"
class="form-control"
placeholder="MM/YY"
maxlength="5"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

CVV

</label>

<input
type="password"
class="form-control"
placeholder="***"
maxlength="3"
required>

</div>

</div>

<p class="secure">

🔒 Your card information is securely encrypted.

</p>

<button
type="submit"
class="btn btn-success w-100 pay-btn">

💳 Pay ₹ {{ total }}

</button>

</form>

</div>

</body>
</html>
