<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cash On Delivery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

background:linear-gradient(135deg,#11998e,#38ef7d);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:30px;

}

.cod-box{

background:white;

width:100%;
max-width:850px;

padding:40px;

border-radius:25px;

box-shadow:0 20px 40px rgba(0,0,0,.25);

animation:popup .8s;

}

@keyframes popup{

from{
transform:scale(.8);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

h1{

text-align:center;

font-weight:bold;

color:#198754;

margin-bottom:10px;

}

.total{

text-align:center;

font-size:38px;

font-weight:bold;

color:#198754;

margin-bottom:25px;

}

.cod-banner{

background:#d1fae5;

padding:20px;

border-radius:18px;

text-align:center;

margin-bottom:30px;

}

.cod-banner h3{

color:#198754;

font-weight:bold;

margin-bottom:10px;

}

.form-label{

font-weight:bold;

}

.form-control,
.form-select{

height:50px;

border-radius:12px;

}

textarea{

height:120px !important;

resize:none;

padding-top:12px;

}

.btn-order{

height:55px;

font-size:22px;

font-weight:bold;

border-radius:50px;

margin-top:15px;

}

.note{

margin-top:20px;

text-align:center;

color:#666;

font-size:15px;

}

</style>

</head>

<body>

<div class="cod-box">

<h1>

🚚 Cash On Delivery

</h1>

<div class="total">

₹ {{ total }}

</div>

<div class="cod-banner">

<h3>

🌱 Pay After Delivery

</h3>

<p>

No advance payment required. Pay only after receiving your fresh organic products.

</p>

</div>

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">

📞 Contact Number

</label>

<input
type="tel"
class="form-control"
placeholder="Enter 10-digit Mobile Number"
maxlength="10"
pattern="[0-9]{10}"
required>

</div>

<div class="mb-3">

<label class="form-label">

🏠 House No / Building Name

</label>

<input
type="text"
class="form-control"
placeholder="House No, Apartment, Building Name"
required>

</div>

<div class="mb-3">

<label class="form-label">

📍 Street / Area / Landmark

</label>

<textarea
class="form-control"
placeholder="Street, Area, Landmark"
required></textarea>

</div>

<div class="row">

<div class="col-md-4 mb-3">

<label class="form-label">

🏙️ City

</label>

<input
type="text"
class="form-control"
placeholder="Enter City"
required>

</div>

<div class="col-md-4 mb-3">

<label class="form-label">

🌎 State

</label>

<select
class="form-select"
required>

<option value="">Select State</option>

<option>Andhra Pradesh</option>
<option>Arunachal Pradesh</option>
<option>Assam</option>
<option>Bihar</option>
<option>Chhattisgarh</option>
<option>Goa</option>
<option>Gujarat</option>
<option>Haryana</option>
<option>Himachal Pradesh</option>
<option>Jharkhand</option>
<option>Karnataka</option>
<option>Kerala</option>
<option>Madhya Pradesh</option>
<option>Maharashtra</option>
<option>Manipur</option>
<option>Meghalaya</option>
<option>Mizoram</option>
<option>Nagaland</option>
<option>Odisha</option>
<option>Punjab</option>
<option>Rajasthan</option>
<option>Sikkim</option>
<option>Tamil Nadu</option>
<option>Telangana</option>
<option>Tripura</option>
<option>Uttar Pradesh</option>
<option>Uttarakhand</option>
<option>West Bengal</option>

</select>

</div>

<div class="col-md-4 mb-3">

<label class="form-label">

📮 PIN Code

</label>

<input
type="text"
class="form-control"
placeholder="Enter 6-digit PIN"
maxlength="6"
pattern="[0-9]{6}"
required>

</div>

</div>

<div class="mb-3">

<label class="form-label">

🕒 Preferred Delivery Time

</label>

<select class="form-select">

<option>Morning (8:00 AM - 11:00 AM)</option>

<option>Afternoon (12:00 PM - 4:00 PM)</option>

<option>Evening (5:00 PM - 9:00 PM)</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">

📝 Delivery Instructions (Optional)

</label>

<textarea
class="form-control"
placeholder="Example: Leave at the front door or call before delivery"></textarea>

</div>

<button
type="submit"
class="btn btn-success w-100 btn-order">

✅ Confirm Order

</button>

<p class="note">

🚚 Estimated Delivery: <strong>1–2 Business Days</strong>

</p>

</form>

</div>

</body>
</html>
