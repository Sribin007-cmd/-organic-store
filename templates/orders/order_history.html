<!DOCTYPE html>
<html>
<head>

    <title>My Orders</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:#f4fff4;">
    {% include 'navbar.html' %}

<div class="container mt-5">

    <h1 class="text-success mb-4">
        📦 My Orders
    </h1>

    {% for order in orders %}

    <div class="card mb-3">

        <div class="card-body">

            <h4>{{ order.full_name }}</h4>

            <p>
                <strong>Phone:</strong>
                {{ order.phone }}
            </p>

            <p>
                <strong>Address:</strong>
                {{ order.address }}
            </p>

            <p>
                <strong>Total:</strong>
                ₹ {{ order.total_amount }}
            </p>

            <p>
                <strong>Date:</strong>
                {{ order.created_at }}
            </p>

        </div>

    </div>

    {% empty %}

    <div class="alert alert-warning">
        No orders found.
    </div>

    {% endfor %}

</div>

</body>
</html>
