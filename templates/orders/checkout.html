<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4fff4;
        }

        .checkout-card{
            background:white;
            border-radius:20px;
            padding:40px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        .header-box{
            background:linear-gradient(135deg,#28a745,#7ed957);
            color:white;
            padding:30px;
            border-radius:20px;
            margin-bottom:30px;
            text-align:center;
        }

    </style>

</head>
<body>
    {% include 'navbar.html' %}

<div class="container py-5">

    <div class="header-box">

        <h1>📦 Checkout</h1>

        <p>Complete your organic shopping order</p>

    </div>

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="checkout-card">

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">
                            Full Name
                        </label>

                        <input
                            type="text"
                            name="full_name"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Phone Number
                        </label>

                        <input
                            type="text"
                            name="phone"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Delivery Address
                        </label>

                        <textarea
                            name="address"
                            rows="4"
                            class="form-control"
                            required></textarea>

                    </div>

                    <hr>

                    <h3 class="text-success">
                        Total Amount: ₹ {{ total }}
                    </h3>

                    <button
                        type="submit"
                        class="btn btn-success btn-lg w-100 mt-3">

                        Place Order

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
