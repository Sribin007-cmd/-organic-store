<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Organic Store Payment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#11998e,#38ef7d);
overflow-x:hidden;
position:relative;
}

/* Floating Fruits */

.fruit{
position:absolute;
font-size:70px;
animation:float 8s infinite ease-in-out;
opacity:.8;
}

.f1{
top:8%;
left:10%;
animation-delay:0s;
}

.f2{
top:70%;
left:8%;
animation-delay:2s;
}

.f3{
top:15%;
right:10%;
animation-delay:4s;
}

.f4{
top:75%;
right:12%;
animation-delay:6s;
}

.f5{
top:40%;
left:4%;
animation-delay:1s;
}

.f6{
top:40%;
right:4%;
animation-delay:3s;
}

@keyframes float{

0%{
transform:translateY(0px) rotate(0deg);
}

50%{
transform:translateY(-30px) rotate(15deg);
}

100%{
transform:translateY(0px) rotate(0deg);
}

}

/* Main Card */

.payment-container{
display:flex;
justify-content:center;
align-items:center;
padding:60px 20px;
}

.payment-box{

width:100%;
max-width:950px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(20px);

border-radius:30px;

padding:40px;

box-shadow:0 20px 60px rgba(0,0,0,.25);

border:1px solid rgba(255,255,255,.2);
}

.title{

text-align:center;

color:white;

font-size:3rem;

font-weight:700;

margin-bottom:30px;
}

/* Cards */

.pay-card{

background:white;

border-radius:20px;

padding:25px;

margin-bottom:25px;

transition:.4s;

box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.pay-card:hover{

transform:translateY(-8px);

box-shadow:0 20px 40px rgba(0,0,0,.15);
}

.pay-card h3{

color:#11998e;

margin-bottom:15px;

font-weight:700;
}

.qr-img{

max-width:300px;

border-radius:20px;

box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.form-control,
.form-select{

padding:12px;

border-radius:12px;
}

.confirm-btn{

background:#11998e;

border:none;

padding:15px 50px;

font-size:20px;

font-weight:bold;

border-radius:50px;

transition:.4s;
}

.confirm-btn:hover{

transform:scale(1.05);

background:#0c7d73;
}

</style>

</head>

<body>

<div class="fruit f1">🍎</div>
<div class="fruit f2">🥕</div>
<div class="fruit f3">🍊</div>
<div class="fruit f4">🥬</div>
<div class="fruit f5">🍉</div>
<div class="fruit f6">🥦</div>

<div class="payment-container">

<form method="POST" style="width:100%;">
{% csrf_token %}

<div class="payment-box">

<h1 class="title">
🌱 Organic Store Payment
</h1>

<!-- UPI -->

<div class="pay-card text-center">

<h3>📱 UPI Payment</h3>

<p>Scan and pay using any UPI app</p>

<img src="/media/payment/upi_qr.png"
class="img-fluid qr-img">

<h5 class="mt-3">
UPI ID: wwwmohanan88@oksbi
</h5>

</div>

<!-- CARD -->

<div class="pay-card">

<h3>💳 Credit / Debit Card</h3>

<input type="text"
class="form-control mb-3"
placeholder="Card Number">

<input type="text"
class="form-control mb-3"
placeholder="Card Holder Name">

<div class="row">

<div class="col-md-6">
<input type="text"
class="form-control"
placeholder="MM/YY">
</div>

<div class="col-md-6">
<input type="password"
class="form-control"
placeholder="CVV">
</div>

</div>

</div>

<!-- COD -->

<div class="pay-card">

<h3>🚚 Cash On Delivery</h3>

<textarea
class="form-control mb-3"
placeholder="Delivery Instructions"></textarea>

<select class="form-select">

<option>Morning Delivery</option>
<option>Afternoon Delivery</option>
<option>Evening Delivery</option>

</select>

</div>

<div class="text-center">

<button type="submit"
class="confirm-btn text-white">

✅ Confirm Order

</button>

</div>

</div>

</form>

</div>

</body>
</html>
