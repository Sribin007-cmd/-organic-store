<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UPI Payment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(135deg,#0f9b0f,#38ef7d);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;
}

.payment-box{
    width:90%;
    max-width:650px;
    background:white;
    border-radius:25px;
    padding:40px;
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,.2);
    animation:pop .8s;
}

@keyframes pop{
from{
transform:scale(.8);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.qr{
    width:320px;
    border-radius:20px;
    margin:20px auto;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.amount{
    font-size:35px;
    color:#198754;
    font-weight:bold;
}

.upi{
    font-size:22px;
    font-weight:bold;
    color:#444;
}

.payapps{
    font-size:40px;
    margin:20px 0;
}

button{
    border:none;
    background:#198754;
    color:white;
    padding:15px 50px;
    border-radius:50px;
    font-size:20px;
    transition:.3s;
}

button:hover{
transform:scale(1.05);
background:#157347;
}

.payapps{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:25px;
    margin-top:25px;
}

.pay-logo{
    height:35px;
    width:auto;
    transition:.3s;
}

.pay-logo:hover{
    transform:scale(1.1);
}

</style>

</head>

<body>

<div class="payment-box">

<h1>📱 UPI Payment</h1>

<p>Please scan the QR Code using any UPI App</p>

<h2 class="amount">
₹ {{ total }}
</h2>

<img src="/media/payment/upi_qr.jpg"
     class="qr"
     alt="UPI QR">

<div class="upi">

UPI ID

<br>

wwwmohanan88@oksbi

</div>

<div class="payapps">

    <img src="/media/payment/gpay.png" class="pay-logo" alt="Google Pay">

    <img src="/media/payment/phonepe.png" class="pay-logo" alt="PhonePe">

    <img src="/media/payment/paytm.png" class="pay-logo" alt="Paytm">

</div>

<form method="POST">

{% csrf_token %}

<button type="submit">

✅ I Have Paid

</button>

</form>

</div>

</body>
</html>
