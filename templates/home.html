<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Organic Fresh Market</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#56ab2f,#a8e063);
}

.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    position:relative;
}

.hero-content{
    z-index:10;
}

.hero h1{
    font-size:80px;
    font-weight:bold;
    text-shadow:2px 2px 10px rgba(0,0,0,0.2);
}

.hero p{
    font-size:28px;
    margin-top:20px;
}

.shop-btn{
    transition:.4s;
}

.shop-btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px white;
}

.login-btn:hover{
    transform:scale(1.1);
}

.fruit{
    position:absolute;
    font-size:70px;
    animation:float 6s ease-in-out infinite;
}

.fruit1{
    top:8%;
    left:8%;
}

.fruit2{
    top:15%;
    right:10%;
    animation-delay:1s;
}

.fruit3{
    bottom:20%;
    left:10%;
    animation-delay:2s;
}

.fruit4{
    bottom:10%;
    right:15%;
    animation-delay:3s;
}

.fruit5{
    top:45%;
    left:5%;
    animation-delay:4s;
}

.fruit6{
    top:50%;
    right:5%;
    animation-delay:5s;
}

@keyframes float{
    0%{
        transform:translateY(0px) rotate(0deg);
    }

    50%{
        transform:translateY(-30px) rotate(10deg);
    }

    100%{
        transform:translateY(0px) rotate(0deg);
    }
}

.glow{
    position:absolute;
    width:300px;
    height:300px;
    border-radius:50%;
    background:rgba(255,255,255,0.15);
    filter:blur(60px);
}

.glow1{
    top:-50px;
    left:-50px;
}

.glow2{
    bottom:-50px;
    right:-50px;
}

</style>

</head>

<body>

<div class="hero">

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="fruit fruit1">🍎</div>
<div class="fruit fruit2">🥕</div>
<div class="fruit fruit3">🍊</div>
<div class="fruit fruit4">🥬</div>
<div class="fruit fruit5">🍅</div>
<div class="fruit fruit6">🥒</div>

<div class="hero-content">

<h1>🌱 Organic Fresh Market</h1>

<p>
Fresh Fruits & Vegetables Delivered To Your Doorstep
</p>

<br><br>

<a href="/products/" class="btn btn-light btn-lg shop-btn">
🛒 Shop Now
</a>

<a href="/accounts/login/" class="btn btn-dark btn-lg login-btn">
🔐 Login
</a>

</div>

</div>

</body>
</html>
