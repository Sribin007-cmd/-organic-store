{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Organic Fresh Market</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
overflow-x:hidden;
}

/* HERO */

.hero{

height:100vh;

background:
linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
url("{% static 'images/hero.jpg' %}");

background-size:cover;

background-position:center;

background-repeat:no-repeat;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

position:relative;

}

/* CONTENT */

.hero-content{

color:white;

z-index:2;

animation:fadeIn 2s;

padding:20px;

}

.hero h1{

font-size:70px;

font-weight:bold;

text-shadow:3px 3px 12px rgba(0,0,0,.6);

}

.hero p{

font-size:28px;

margin-top:20px;

text-shadow:2px 2px 10px rgba(0,0,0,.6);

}

/* BUTTONS */

.btn-custom{

padding:14px 40px;

font-size:20px;

border-radius:40px;

margin:15px;

transition:.4s;

font-weight:bold;

}

.btn-custom:hover{

transform:translateY(-5px);

box-shadow:0 10px 25px rgba(255,255,255,.4);

}

.shop-btn{

background:#28a745;

color:white;

border:none;

}

.shop-btn:hover{

background:#218838;

color:white;

}

.login-btn{

background:white;

color:#198754;

}

.login-btn:hover{

background:#f8f9fa;

color:#198754;

}

/* FLOATING ICONS */

.float{

position:absolute;

font-size:55px;

animation:float 6s ease-in-out infinite;

opacity:.9;

}

.f1{

top:10%;

left:8%;

}

.f2{

top:18%;

right:8%;

animation-delay:1s;

}

.f3{

bottom:18%;

left:10%;

animation-delay:2s;

}

.f4{

bottom:10%;

right:12%;

animation-delay:3s;

}

.f5{

top:45%;

left:4%;

animation-delay:4s;

}

.f6{

top:50%;

right:5%;

animation-delay:5s;

}

@keyframes float{

0%{
transform:translateY(0px) rotate(0deg);
}

50%{
transform:translateY(-25px) rotate(8deg);
}

100%{
transform:translateY(0px) rotate(0deg);
}

}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* RESPONSIVE */

@media(max-width:768px){

.hero h1{

font-size:42px;

}

.hero p{

font-size:20px;

}

.btn-custom{

display:block;

width:220px;

margin:15px auto;

}

.float{

font-size:35px;

}

}

</style>

</head>

<body>

<div class="hero">

<div class="float f1">🍎</div>
<div class="float f2">🥕</div>
<div class="float f3">🍇</div>
<div class="float f4">🥬</div>
<div class="float f5">🥒</div>
<div class="float f6">🍅</div>

<div class="hero-content">

<h1>Organic Fresh Market</h1>

<p>

Fresh Organic Fruits & Vegetables Delivered To Your Doorstep

</p>

<br>

<a href="{% url 'product_list' %}"
class="btn btn-custom shop-btn">

🛒 Shop Now

</a>

<a href="{% url 'login' %}"
class="btn btn-custom login-btn">

🔐 Login

</a>

</div>

</div>

</body>
</html>
