<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cart Empty</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#11998e,#38ef7d);
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card-box{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border-radius:30px;
    padding:50px;
    text-align:center;
    color:white;
    width:700px;
    box-shadow:0 15px 40px rgba(0,0,0,.2);
}

.cart-icon{
    font-size:120px;
    animation:bounce 2s infinite;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-20px);
    }
}

h1{
    font-size:50px;
    font-weight:bold;
}

p{
    font-size:22px;
}

.shop-btn{
    padding:15px 35px;
    font-size:20px;
    border-radius:50px;
    transition:.4s;
}

.shop-btn:hover{
    transform:scale(1.1);
}

.fruit{
    position:absolute;
    font-size:70px;
    animation:float 6s ease-in-out infinite;
}

.f1{top:10%;left:10%;}
.f2{top:15%;right:10%;animation-delay:1s;}
.f3{bottom:15%;left:15%;animation-delay:2s;}
.f4{bottom:10%;right:15%;animation-delay:3s;}
.f5{top:50%;left:5%;animation-delay:4s;}
.f6{top:50%;right:5%;animation-delay:5s;}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-30px);}
    100%{transform:translateY(0);}
}

</style>

</head>

<body>

<div class="fruit f1">🍎</div>
<div class="fruit f2">🥕</div>
<div class="fruit f3">🍊</div>
<div class="fruit f4">🥬</div>
<div class="fruit f5">🍅</div>
<div class="fruit f6">🥒</div>

<div class="card-box">

<div class="cart-icon">
🛒
</div>

<h1>Oops!</h1>

<h2>Your Cart Is Empty</h2>

<br>

<p>
Fresh organic fruits and vegetables are waiting for you.
Start shopping and fill your basket with healthy goodness!
</p>

<br><br>

<a href="/products/" class="btn btn-light btn-lg shop-btn">
🌱 Explore Products
</a>

</div>

</body>
</html>
