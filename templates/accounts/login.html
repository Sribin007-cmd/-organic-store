<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Organic Store</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    margin:0;
    height:100vh;
    background:linear-gradient(135deg,#28a745,#8bc34a);
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-card{
    width:420px;
    background:white;
    border-radius:20px;
    padding:40px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.logo{
    font-size:50px;
    text-align:center;
}

.title{
    text-align:center;
    color:#198754;
    font-weight:bold;
    margin-bottom:25px;
}

.btn-login{
    width:100%;
}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">
🌱
</div>

<h2 class="title">
Organic Store Login
</h2>

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">
Username
</label>

<input
type="text"
name="username"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">
Password
</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>

<button
type="submit"
class="btn btn-success btn-login">

Login

</button>

</form>

<hr>

<div class="text-center">

Don't have an account?

<br><br>

<a
href="/accounts/register/"
class="btn btn-outline-success">

Create Account

</a>

</div>

</div>

</body>
</html>
